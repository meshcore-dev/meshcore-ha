name: Lint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install ruff
      # Advisory until the one-time normalization PR lands. `--exit-zero`
      # annotates findings on the PR without failing the check; the format
      # step is non-fatal for the same reason. Flip both to hard gates after
      # the tree is normalized.
      - name: ruff check (advisory)
        run: ruff check --output-format=github --exit-zero .
      - name: ruff format --check (advisory)
        run: ruff format --check --diff . || true

# =============================================================================
# MeshCore RRY_Scribe — UI Lovelace Minimalist (two views; sync with rry-scribe-dashboard.yaml)
# =============================================================================
# View 1: messaging (panel + 3-col grid) | View 2: monitoring 3-col + map
# =============================================================================

views:
  - title: MeshCore · Messages
    path: meshcore-messaging-ulm
    type: panel
    cards:
      - type: grid
        columns: 3
        square: false
        cards:
          - type: vertical-stack
            cards:
              - type: custom:button-card
                template: card_title
                name: Channel log · read mesh traffic
                label: Tap a channel, history appears below
              - type: horizontal-stack
                cards:
                  - type: custom:bubble-card
                    card_type: button
                    button_type: name
                    name: Public
                    icon: mdi:earth
                    tap_action:
                      action: call-service
                      service: select.select_option
                      target:
                        entity_id: select.meshcore_channel
                      data:
                        option: "Public (0)"
                  - type: custom:bubble-card
                    card_type: button
                    button_type: name
                    name: "#bemesh"
                    icon: mdi:pound
                    tap_action:
                      action: call-service
                      service: select.select_option
                      target:
                        entity_id: select.meshcore_channel
                      data:
                        option: "#bemesh (1)"
                  - type: custom:bubble-card
                    card_type: button
                    button_type: name
                    name: "#b-stby"
                    icon: mdi:moon-waning-crescent
                    tap_action:
                      action: call-service
                      service: select.select_option
                      target:
                        entity_id: select.meshcore_channel
                      data:
                        option: "#b-stby (3)"
              - type: conditional
                conditions:
                  - condition: state
                    entity: select.meshcore_channel
                    state: "Public (0)"
                card:
                  type: logbook
                  title: Public · message history
                  entities:
                    - binary_sensor.meshcore_bf46e7_ch_0_messages
                  hours_to_show: 720
              - type: conditional
                conditions:
                  - condition: state
                    entity: select.meshcore_channel
                    state: "#bemesh (1)"
                card:
                  type: logbook
                  title: "#bemesh · message history"
                  entities:
                    - binary_sensor.meshcore_bf46e7_ch_1_messages
                  hours_to_show: 720
              - type: conditional
                conditions:
                  - condition: state
                    entity: select.meshcore_channel
                    state: "#b-stby (3)"
                card:
                  type: logbook
                  title: "#b-stby · message history"
                  entities:
                    - binary_sensor.meshcore_bf46e7_ch_3_messages
                  hours_to_show: 720

          - type: vertical-stack
            cards:
              - type: custom:button-card
                template: card_title
                name: Compose · send to channel or contact
                label: Pick recipient, write text, then send
              - type: custom:button-card
                template: card_title
                name: Recipient
                label: Channel or contact (same as select.meshcore_recipient_type)
              - type: horizontal-stack
                cards:
                  - type: custom:bubble-card
                    card_type: button
                    button_type: name
                    name: Channel
                    icon: mdi:forum-outline
                    tap_action:
                      action: call-service
                      service: select.select_option
                      target:
                        entity_id: select.meshcore_recipient_type
                      data:
                        option: Channel
                  - type: custom:bubble-card
                    card_type: button
                    button_type: name
                    name: Contact
                    icon: mdi:account
                    tap_action:
                      action: call-service
                      service: select.select_option
                      target:
                        entity_id: select.meshcore_recipient_type
                      data:
                        option: Contact
              - type: conditional
                conditions:
                  - condition: state
                    entity: select.meshcore_recipient_type
                    state: Channel
                card:
                  type: entities
                  entities:
                    - entity: select.meshcore_channel
                      name: Target channel
              - type: conditional
                conditions:
                  - condition: state
                    entity: select.meshcore_recipient_type
                    state: Contact
                card:
                  type: entities
                  entities:
                    - entity: select.meshcore_contact
                      name: Target contact
              - type: entities
                title: Message
                entities:
                  - entity: text.meshcore_message
                    name: Text
              - type: custom:bubble-card
                card_type: button
                button_type: name
                name: Send now
                icon: mdi:send
                card_layout: large
                tap_action:
                  action: call-service
                  service: meshcore.send_ui_message
                  data: {}

          - type: vertical-stack
            cards:
              - type: custom:button-card
                template: card_title
                name: Private messages · one contact
                label: Pick a contact, logbook shows that DM thread
              - type: entities
                title: Conversation
                show_header_toggle: false
                entities:
                  - entity: select.meshcore_dm_log_contact
                    name: Show log for
              - type: custom:auto-entities
                card:
                  type: logbook
                  title: Direct messages (RX & TX)
                  hours_to_show: 720
                show_empty: false
                else:
                  type: markdown
                  content: >
                    Pick a contact in **Show log for** to load this logbook. If you see this while a contact is
                    selected, the DM message entity may not exist yet (no traffic with that contact).
                filter:
                  template: |
                    {% set eid = state_attr('select.meshcore_dm_log_contact', 'message_log_entity_id') %}
                    {{ [eid] if eid else [] }}

  - title: MeshCore · Monitor
    path: meshcore-monitoring-ulm
    type: panel
    cards:
      - type: vertical-stack
        cards:
          - type: grid
            columns: 3
            square: false
            cards:
              - type: vertical-stack
                cards:
                  - type: custom:button-card
                    template: card_title
                    name: "BE-KJK-RRY20☀️ · repeater health & RF"
                    label: Battery, RF, traffic, uptime
                  - type: horizontal-stack
                    cards:
                      - type: custom:button-card
                        template: card_generic
                        entity: sensor.meshcore_7aa6d67962_bat_be_kjk_rry20
                        variables:
                          ulm_card_generic_color: cyan
                      - type: custom:button-card
                        template: card_generic
                        entity: sensor.meshcore_7aa6d67962_battery_percentage_be_kjk_rry20
                        variables:
                          ulm_card_generic_color: green
                  - type: custom:bubble-card
                    card_type: separator
                    name: BE-KJK-RRY20 · snapshot
                    icon: mdi:router-wireless
                  - type: horizontal-stack
                    cards:
                      - type: vertical-stack
                        cards:
                          - type: custom:bubble-card
                            card_type: button
                            button_type: state
                            entity: sensor.meshcore_7aa6d67962_uptime_be_kjk_rry20
                            name: Uptime
                            show_state: true
                            show_icon: true
                          - type: custom:bubble-card
                            card_type: button
                            button_type: state
                            entity: sensor.meshcore_7aa6d67962_last_rssi_be_kjk_rry20
                            name: Last RSSI
                            show_state: true
                            show_icon: true
                          - type: custom:bubble-card
                            card_type: button
                            button_type: state
                            entity: sensor.meshcore_7aa6d67962_last_snr_be_kjk_rry20
                            name: Last SNR
                            show_state: true
                            show_icon: true
                      - type: vertical-stack
                        cards:
                          - type: custom:bubble-card
                            card_type: button
                            button_type: state
                            entity: sensor.meshcore_7aa6d67962_tx_queue_len_be_kjk_rry20
                            name: TX queue
                            show_state: true
                            show_icon: true
                          - type: custom:bubble-card
                            card_type: button
                            button_type: state
                            entity: sensor.meshcore_7aa6d67962_nb_recv_rate_be_kjk_rry20
                            name: Recv rate
                            show_state: true
                            show_icon: true
                          - type: custom:bubble-card
                            card_type: button
                            button_type: state
                            entity: sensor.meshcore_7aa6d67962_nb_sent_rate_be_kjk_rry20
                            name: Sent rate
                            show_state: true
                            show_icon: true
                  - type: entities
                    title: Counters & RX airtime
                    show_header_toggle: false
                    entities:
                      - entity: sensor.meshcore_7aa6d67962_nb_recv_be_kjk_rry20
                        name: Packets received (total)
                      - entity: sensor.meshcore_7aa6d67962_nb_sent_be_kjk_rry20
                        name: Packets sent (total)
                      - entity: sensor.meshcore_7aa6d67962_recv_direct_be_kjk_rry20
                        name: Recv direct (total)
                      - entity: sensor.meshcore_7aa6d67962_recv_flood_be_kjk_rry20
                        name: Recv flood (total)
                      - entity: sensor.meshcore_7aa6d67962_sent_direct_be_kjk_rry20
                        name: Sent direct (total)
                      - entity: sensor.meshcore_7aa6d67962_sent_flood_be_kjk_rry20
                        name: Sent flood (total)
                      - entity: sensor.meshcore_7aa6d67962_rx_airtime_utilization_be_kjk_rry20
                        name: RX airtime utilization
                      - entity: sensor.meshcore_7aa6d67962_rx_airtime_be_kjk_rry20
                        name: RX airtime (cumulative)
                      - entity: sensor.meshcore_7aa6d67962_full_evts_be_kjk_rry20
                        name: Full queue events
                  - type: custom:mini-graph-card
                    name: Battery voltage · last 14 days
                    icon: mdi:battery-heart-variant
                    hours_to_show: 336
                    points_per_hour: 0.25
                    line_width: 2
                    height: 180
                    entities:
                      - entity: sensor.meshcore_7aa6d67962_bat_be_kjk_rry20
                        name: Voltage
                    show:
                      graph: line
                      points: hover
                      legend: false
                  - type: horizontal-stack
                    cards:
                      - type: custom:mini-graph-card
                        name: Airtime usage · last 24h
                        icon: mdi:percent
                        hours_to_show: 24
                        points_per_hour: 2
                        height: 140
                        entities:
                          - entity: sensor.meshcore_7aa6d67962_airtime_utilization_be_kjk_rry20
                        show:
                          graph: line
                          legend: false
                      - type: custom:mini-graph-card
                        name: RF noise floor · last 24h
                        icon: mdi:waveform
                        hours_to_show: 24
                        points_per_hour: 2
                        height: 140
                        entities:
                          - entity: sensor.meshcore_7aa6d67962_noise_floor_be_kjk_rry20
                        show:
                          graph: line
                          legend: false
                  - type: horizontal-stack
                    cards:
                      - type: custom:mini-graph-card
                        name: Msg rate in / out · last 24h
                        icon: mdi:swap-vertical
                        hours_to_show: 24
                        points_per_hour: 2
                        height: 140
                        entities:
                          - entity: sensor.meshcore_7aa6d67962_nb_recv_rate_be_kjk_rry20
                            name: Recv
                          - entity: sensor.meshcore_7aa6d67962_nb_sent_rate_be_kjk_rry20
                            name: Sent
                        show:
                          graph: line
                          points: hover
                          legend: true
                      - type: custom:mini-graph-card
                        name: RSSI · last 24h
                        icon: mdi:signal
                        hours_to_show: 24
                        points_per_hour: 2
                        height: 140
                        entities:
                          - entity: sensor.meshcore_7aa6d67962_last_rssi_be_kjk_rry20
                        show:
                          graph: line
                          legend: false

              - type: vertical-stack
                cards:
                  - type: custom:button-card
                    template: card_title
                    name: Companion · remote management
                    label: Quick commands, last reply, custom CLI
                  - type: markdown
                    content: >
                      **Quick commands** call `meshcore.execute_command`. **Last reply** shows status; open the entity
                      for full **detail**. Requires updated meshcore-ha with `sensor.meshcore_last_command_result`.
                  - type: entities
                    title: Last reply
                    show_header_toggle: false
                    entities:
                      - entity: sensor.meshcore_last_command_result
                        name: Status
                  - type: custom:bubble-card
                    card_type: separator
                    name: Quick commands
                    icon: mdi:flash
                  - type: horizontal-stack
                    cards:
                      - type: vertical-stack
                        cards:
                          - type: custom:bubble-card
                            card_type: button
                            button_type: name
                            name: Battery
                            icon: mdi:battery
                            tap_action:
                              action: call-service
                              service: meshcore.execute_command
                              data:
                                command: get_bat
                          - type: custom:bubble-card
                            card_type: button
                            button_type: name
                            name: Time
                            icon: mdi:clock-outline
                            tap_action:
                              action: call-service
                              service: meshcore.execute_command
                              data:
                                command: get_time
                          - type: custom:bubble-card
                            card_type: button
                            button_type: name
                            name: Telemetry
                            icon: mdi:crosshairs-gps
                            tap_action:
                              action: call-service
                              service: meshcore.execute_command
                              data:
                                command: get_self_telemetry
                          - type: custom:bubble-card
                            card_type: button
                            button_type: name
                            name: Stats core
                            icon: mdi:memory
                            tap_action:
                              action: call-service
                              service: meshcore.execute_command
                              data:
                                command: get_stats_core
                          - type: custom:bubble-card
                            card_type: button
                            button_type: name
                            name: Stats radio
                            icon: mdi:radio-tower
                            tap_action:
                              action: call-service
                              service: meshcore.execute_command
                              data:
                                command: get_stats_radio
                          - type: custom:bubble-card
                            card_type: button
                            button_type: name
                            name: Stats packets
                            icon: mdi:package-variant
                            tap_action:
                              action: call-service
                              service: meshcore.execute_command
                              data:
                                command: get_stats_packets
                      - type: vertical-stack
                        cards:
                          - type: custom:bubble-card
                            card_type: button
                            button_type: name
                            name: Contacts
                            icon: mdi:account-multiple
                            tap_action:
                              action: call-service
                              service: meshcore.execute_command
                              data:
                                command: get_contacts 0
                          - type: custom:bubble-card
                            card_type: button
                            button_type: name
                            name: Device query
                            icon: mdi:information-outline
                            tap_action:
                              action: call-service
                              service: meshcore.execute_command
                              data:
                                command: send_device_query
                          - type: custom:bubble-card
                            card_type: button
                            button_type: name
                            name: Channel 0
                            icon: mdi:pound
                            tap_action:
                              action: call-service
                              service: meshcore.execute_command
                              data:
                                command: get_channel 0
                          - type: custom:bubble-card
                            card_type: button
                            button_type: name
                            name: Freq limits
                            icon: mdi:sine-wave
                            tap_action:
                              action: call-service
                              service: meshcore.execute_command
                              data:
                                command: get_allowed_repeat_freq
                          - type: custom:bubble-card
                            card_type: button
                            button_type: name
                            name: Path mode
                            icon: mdi:routes
                            tap_action:
                              action: call-service
                              service: meshcore.execute_command
                              data:
                                command: get_path_hash_mode
                          - type: custom:bubble-card
                            card_type: button
                            button_type: name
                            name: Custom vars
                            icon: mdi:variables
                            tap_action:
                              action: call-service
                              service: meshcore.execute_command
                              data:
                                command: get_custom_vars

              - type: vertical-stack
                cards:
                  - type: custom:bubble-card
                    card_type: separator
                    name: Custom command
                    icon: mdi:keyboard
                  - type: entities
                    title: Command line
                    entities:
                      - entity: text.meshcore_command
                        name: Command text
                  - type: custom:bubble-card
                    card_type: button
                    button_type: name
                    name: Run custom command
                    icon: mdi:play
                    card_layout: large
                    tap_action:
                      action: call-service
                      service: meshcore.execute_command_ui
                      data: {}
                  - type: custom:bubble-card
                    card_type: separator
                    name: Map
                    icon: mdi:map-search-outline
                  - type: custom:bubble-card
                    card_type: button
                    button_type: name
                    name: Open mesh map
                    icon: mdi:map-marker-radius
                    card_layout: large
                    button_action:
                      tap_action:
                        action: navigate
                        navigation_path: "#meshcore-contacts-map"
                  - type: custom:bubble-card
                    card_type: separator
                    name: Maintenance
                    icon: mdi:alert-octagon-outline
                  - type: horizontal-stack
                    cards:
                      - type: custom:bubble-card
                        card_type: button
                        button_type: name
                        name: Reboot companion
                        icon: mdi:restart-alert
                        tap_action:
                          action: call-service
                          service: meshcore.execute_command
                          data:
                            command: reboot

          - type: vertical-stack
            cards:
              - type: custom:bubble-card
                card_type: pop-up
                hash: "#meshcore-contacts-map"
                name: Contacts on the map
                icon: mdi:map
                width_desktop: 90%
                card_layout: large
              - type: custom:auto-entities
                card:
                  type: map
                  default_zoom: 12
                  aspect_ratio: 16:9
                filter:
                  include:
                    - entity_id: device_tracker.meshcore_*
                sort:
                  method: name
                  ignore_case: true
